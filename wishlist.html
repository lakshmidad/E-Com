<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - LuxeBuy</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .empty-state { text-align: center; padding: 60px 20px; background: var(--white); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); }
        .empty-state i { font-size: 4rem; color: #E5E7EB; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    
    <div class="page-header" style="background: radial-gradient(circle at top right, #8B5CF6, var(--secondary-color));">
        <div class="container">
            <h1>My Wishlist</h1>
            <div class="breadcrumbs">
                <a href="index.html">Home</a> &gt; <span>Wishlist</span>
            </div>
        </div>
    </div>

    <div class="container" style="margin-bottom: 60px; min-height: 40vh;">
        <div id="wishlist-container">
            <div class="product-grid" id="wishlist-grid">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="assets/js/products.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        function renderWishlistPage() {
            const container = document.getElementById('wishlist-container');
            if(!container) return;
            
            const wishlist = getWishlistItems();
            
            if(wishlist.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-heart"></i>
                        <h2>Your wishlist is empty.</h2>
                        <p style="color: var(--text-light); margin: 15px 0 25px;">Save items you love and buy them later.</p>
                        <a href="products.html" class="btn btn-primary">Discover Products</a>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="wishlist-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                        <h2 style="font-size: 1.5rem; font-weight: 600;">Your Saved Items (${wishlist.length})</h2>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-outline" style="padding: 8px 15px;" onclick="clearWishlist()"><i class="fas fa-trash"></i> Clear</button>
                            <button class="btn btn-primary" style="padding: 8px 15px;" onclick="addAllToCart()"><i class="fas fa-shopping-cart"></i> Add All</button>
                        </div>
                    </div>
                    <div class="product-grid" id="wishlist-grid">
                        ${wishlist.map(createProductCard).join('')}
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderWishlistPage();
        });
    </script>
</body>
</html>
