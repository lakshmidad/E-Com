<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - LuxeBuy</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="page-header">
        <div class="container">
            <h1>Checkout</h1>
            <div class="breadcrumbs">
                <a href="index.html">Home</a> &gt; <a href="cart.html">Cart</a> &gt; <span>Checkout</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="checkout-container">
            <div class="checkout-form">
                <h2 style="margin-bottom: 25px;">Shipping Information</h2>
                <form id="checkout-form" onsubmit="processCheckout(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" required placeholder="123 Main St">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>ZIP/Postal Code</label>
                            <input type="text" required>
                        </div>
                    </div>
                    <h2 style="margin: 30px 0 20px;">Payment Method</h2>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" required placeholder="XXXX XXXX XXXX XXXX" maxlength="16">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" required placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" required placeholder="123" maxlength="3">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mt-4" style="font-size: 1.1rem; padding: 15px;">Place Order</button>
                </form>
            </div>
            
            <div class="cart-summary" style="height: fit-content;">
                <h3 style="margin-bottom: 20px;">Order Summary</h3>
                <div id="checkout-items" style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;">
                    <!-- loaded via JS -->
                </div>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="checkout-subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span id="checkout-total">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="assets/js/products.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        function renderCheckout() {
            const cart = getCartItems();
            const container = document.getElementById('checkout-items');
            
            if(cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            let html = '';
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:0.95rem;">
                        <span>${item.title} x ${item.quantity}</span>
                        <span style="font-weight:600;">$${itemTotal.toFixed(2)}</span>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('checkout-subtotal').textContent = '$' + total.toFixed(2);
            document.getElementById('checkout-total').textContent = '$' + total.toFixed(2);
        }

        function processCheckout(e) {
            e.preventDefault();
            // In a real app we'd validate and send to server
            // For now, clear cart and redirect
            clearCart();
            const orderNo = 'ORD-' + Math.floor(Math.random() * 1000000);
            window.location.href = 'order-confirmation.html?order=' + orderNo;
        }

        document.addEventListener('DOMContentLoaded', renderCheckout);
    </script>
</body>
</html>
